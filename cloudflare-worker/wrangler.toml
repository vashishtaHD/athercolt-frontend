name = "athercolt-api"
main = "src/index.js"
compatibility_date = "2024-03-01"

# Bindings for Google Sheets and Resend
[vars]
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:5173,https://www.athercolt.com,https://athercolt.com"
NOTIFY_SUBJECT_PREFIX = "Athercolt"
MAX_RESUME_SIZE_BYTES = 10485760
# R2_PUBLIC_BASE_URL = ""

[[r2_buckets]]
binding = "RESUME_BUCKET"
bucket_name = "athercolt-resumes-prod"
preview_bucket_name = "athercolt-resumes-dev"
